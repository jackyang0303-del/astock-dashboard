name: Daily Stock Screener

on:
  schedule:
    # 每个工作日 07:35 UTC = 北京时间 15:35
    - cron: '35 7 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare pandas numpy

      - name: Run screener
        run: python .github/scripts/stock_screener.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recommendations.json
          git diff --cached --quiet || git commit -m "chore: update stock recommendations $(date +'%Y-%m-%d')"
          git push
